name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with coverage
        run: |
          set -o pipefail
          python -m pytest tests/ -v --tb=short \
            --cov=autohive_integrations_sdk \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            | tee pytest-coverage.txt

      - name: Coverage report
        uses: MishaKav/pytest-coverage-comment@main
        id: coverage-comment
        with:
          pytest-coverage-path: pytest-coverage.txt
          pytest-xml-coverage-path: coverage.xml
          create-new-comment: ${{ github.event_name == 'pull_request' }}

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: integrations-sdk-coverage
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage-comment.outputs.coverage }}
          valColorRange: ${{ steps.coverage-comment.outputs.coverage }}
          minColorRange: 50
          maxColorRange: 100
