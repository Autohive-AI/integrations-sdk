name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Get commit info
        id: commit-info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            COMMIT_SHA="${{ github.sha }}"
          fi
          echo "short_sha=$(echo "$COMMIT_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --pretty=%s "$COMMIT_SHA")" >> "$GITHUB_OUTPUT"

      - name: Run tests with coverage
        run: |
          set -o pipefail
          python -m pytest tests/ -v --tb=short \
            --cov=autohive_integrations_sdk \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            | tee pytest-coverage.txt

      - name: Parse coverage
        id: coverage
        run: |
          TOTAL=$(grep '^TOTAL' pytest-coverage.txt | awk '{print $(NF-1)}')
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"

          # Build per-file table rows
          TABLE=""
          while IFS= read -r line; do
            FILE=$(echo "$line" | awk '{print $1}')
            STMTS=$(echo "$line" | awk '{print $2}')
            MISS=$(echo "$line" | awk '{print $3}')
            COV=$(echo "$line" | awk '{print $4}')
            MISSING=$(echo "$line" | awk '{for(i=5;i<=NF;i++) printf "%s ", $i; print ""}' | xargs)
            TABLE="${TABLE}| \`${FILE}\` | ${STMTS} | ${MISS} | ${COV} | ${MISSING} |"$'\n'
          done < <(grep '^src/' pytest-coverage.txt)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "table<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${TABLE}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Coverage — \`${{ steps.commit-info.outputs.short_sha }}\` (${{ steps.commit-info.outputs.message }}) by @${{ github.actor }}`;
            const total = `${{ steps.coverage.outputs.total }}`;
            const table = `${{ steps.coverage.outputs.table }}`;
            const marker = '<!-- coverage-comment -->';

            const body = `${marker}\n### ${title}\n\n**Total coverage: ${total}**\n\n| File | Stmts | Miss | Cover | Missing |\n|------|-------|------|-------|---------|\n${table}`;

            // Find and update existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: e8adf35c8508876ab8ba09422ddc2535
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.total }}
          valColorRange: ${{ steps.coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 100
